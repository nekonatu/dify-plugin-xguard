identity:
  name: "content_check"
  author: "xguard"
  label:
    en_US: "Content Safety Check"
    zh_Hans: "内容安全检测"
description:
  human:
    en_US: "Detect safety risks in text across 28 categories before sending to LLM."
    zh_Hans: "在发送给 LLM 之前，对文本进行 28 类内容安全风险检测。"
  llm: "Use this tool to check whether user input text is safe before sending it to an LLM. It detects 28 risk categories including dangerous weapons, drug crimes, cyber attacks, terrorism, pornography, personal privacy violations, and more. Returns is_safe (boolean), risk_category, risk_score, and detailed scores. Call this tool when you need to verify that user input does not contain harmful, illegal, or policy-violating content."
parameters:
  - name: "text"
    type: "string"
    required: true
    form: "llm"
    label:
      en_US: "Text"
      zh_Hans: "文本"
    human_description:
      en_US: "The text content to check for safety risks."
      zh_Hans: "需要进行安全风险检测的文本内容。"
    llm_description: "The user input text to check for safety risks."
  - name: "default_threshold"
    type: "number"
    required: false
    form: "form"
    default: 0.5
    min: 0
    max: 1
    label:
      en_US: "Default Threshold"
      zh_Hans: "默认阈值"
    human_description:
      en_US: "Default risk threshold for all categories (0.0-1.0). Individual category thresholds override this."
      zh_Hans: "所有类别的默认风险阈值（0.0-1.0）。单个类别的阈值会覆盖此值。"
  # ── 色情违禁 ──
  - name: "pc_enabled"
    type: "boolean"
    required: false
    form: "form"
    default: true
    label:
      en_US: "Pornography (pc)"
      zh_Hans: "色情违禁 (pc)"
    human_description:
      en_US: "Enable interception for pornographic/prohibited content."
      zh_Hans: "启用色情违禁内容拦截。"
  - name: "pc_threshold"
    type: "number"
    required: false
    form: "form"
    min: 0
    max: 1
    label:
      en_US: "Pornography Threshold"
      zh_Hans: "色情违禁阈值"
    human_description:
      en_US: "Custom threshold for this category. Leave empty to use default."
      zh_Hans: "该类别的自定义阈值，留空使用默认值。"
  # ── 毒品犯罪 ──
  - name: "dc_enabled"
